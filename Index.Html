<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU-CheckBook-App</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_drop_down" />
</head>
<body>
    <section id="side-nav">
        <div id="eecu-logo">
            <img src="Imgs/logo 1.svg" alt="EECU-Logo">
        </div>
        <a href="index.html" class="home-link">Profile</a>
        
        <div id="side-container">
            <span id="sidenav-options">
                <a class="sidenav-btns" href="money.html">Budgeting</a>
                <a class="sidenav-btns" href="#">Accounts</a>  
            </span>
        </div>
        <div class="drop">
            <button class="drop-btns"><img src="Imgs/drop-arrow.png" alt="Dropdown Arrow">Budget</button>
            <button class="drop-btns"><img src="Imgs/drop-arrow.png" alt="Dropdown Arrow">Loans</button>
            <button class="drop-btns"><img src="Imgs/drop-arrow.png" alt="Dropdown Arrow">Tracking</button>
        </div>
    </section>
    <div class="page">
        <select class="career" id="careerSelect"> 
            <option>Please Select a Career</option>
        </select>
        <label for="account">Create Account</label>
        <input type="text" name="account" id="account">
    </div>
    <a href="money.html" class="next">Create Account</a>
    <script src="app.js"></script>
</body>
</html>
